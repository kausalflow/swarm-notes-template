name: TimeSeriesSkill
description: "Papers focused on time-series analysis, forecasting, or temporal modelling."
extra_system_prompt: |
  Pay special attention to: forecasting horizon, dataset benchmarks 
  (e.g., ETTh1, Traffic, Weather), seasonality handling, and comparison 
  against statistical baselines (ARIMA, Prophet).
preferred_tags:
  - time-series
  - forecasting
  - anomaly-detection
  - temporal
  - sequential
arxiv_categories:
  - eess.SP
  - cs.LG
  - cs.AI
  - stat.ML
  - stat.AP
  - cs.MA
  - stat.ME
  - econ.EM
critic_context: |
  Approve concepts only if they capture a reusable forecasting mechanism, temporal inductive bias,
  representation, calibration method, or evaluation idea likely to recur across datasets and horizons.
  Reject ordinary references to seasonality, benchmark names, prediction windows, or standard baselines unless the paper reframes them as a distinct method.
  Approve open questions only when they expose unresolved issues in distribution shift,
  long-horizon degradation, uncertainty estimation, multiscale structure, or cross-domain transfer.