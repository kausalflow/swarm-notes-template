# Example research-cruise configuration
llm_model: "gemini-flash-lite-latest"
paper_search:
  source: "openalex"  # "arxiv", "semantic_scholar", or "openalex"
  keywords:
    - "time series"
    - "forecasting"
    - "timeseries"
  max_history_days: 3  # hard cutoff: do not keep results older than this many days
  max_results_per_keyword: 10
  total_cap: 30
  arxiv: {}
  semantic_scholar:
    # api_key: ""  # optional; can also come from SEMANTIC_SCHOLAR_API_KEY
    api_url: "https://api.semanticscholar.org/graph/v1/paper/search"
  openalex:
    # api_key: ""  # optional; can also come from OPENALEX_API_KEY
    # mailto: ""   # recommended for polite pool, e.g. name@example.com
    relevance_mode: "all_tokens"  # "phrase" (strict) or "all_tokens" (broader)
    max_pages_per_window: 5  # max OpenAlex pages to scan per recency window
federation_feeds: []
public_feed_max_items: 10

# Skill configuration
active_skills: 
  - "time-series"
skills_dir: "skills"                       # Root directory for skills

# Experimental domain expert agent (crawls HTML, consumes token quotas)
enable_domain_expert: true